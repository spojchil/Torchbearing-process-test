name: MS1 Metadata CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validate frontend metadata
        run: |
          node -e "JSON.parse(require('node:fs').readFileSync('plugin/package.json', 'utf8'))"
          node -e "JSON.parse(require('node:fs').readFileSync('plugin/plugin.json', 'utf8'))"
          node -e "JSON.parse(require('node:fs').readFileSync('plugin/tsconfig.json', 'utf8'))"
          node -e "JSON.parse(require('node:fs').readFileSync('plugin/.prettierrc.json', 'utf8'))"
          node --check plugin/eslint.config.mjs
          node --check plugin/jest.config.cjs
          node --check plugin/webpack.config.mjs

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify backend metadata
        run: go mod verify

      - name: Test backend packages when present
        run: |
          packages="$(go list ./... 2>/dev/null || true)"
          if [ -n "$packages" ]; then
            go test $packages
          else
            echo "No backend packages yet; metadata-only MS1 initialization."
          fi
